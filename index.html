<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة المحقق الذكي</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#0f172a;
    color:white;
    text-align:center;
}

header{
    background:#111827;
    padding:15px;
    font-size:20px;
}

.card{
    background:#1f2937;
    margin:10px auto;
    padding:15px;
    max-width:600px;
    border-radius:12px;
}

button{
    width:90%;
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

.suspect{
    background:#334155;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    cursor:pointer;
}

.suspect.selected{
    border:2px solid #22c55e;
}

.result{
    font-size:20px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>🕵️ لعبة المحقق الذكي</header>

<div class="card">
<h3>📍 مكان الجريمة</h3>
<p id="place"></p>
</div>

<div class="card">
<h3>📋 الأدلة</h3>
<p id="evidence"></p>
<button onclick="showEvidence()">عرض الأدلة</button>
</div>

<div class="card">
<h3>👥 المشتبه بهم</h3>
<div id="suspects"></div>
</div>

<div class="card">
<button onclick="finalAnswer()">⚖️ إصدار الحكم</button>
</div>

<div class="card">
<div class="result" id="result"></div>
</div>

<script>
// بيانات اللعبة
const names = ["سلطان","تركي","مشاري","فيصل","خالد","نواف"];

const blood = ["O+","A+","B+","AB+"];
const perfumes = ["عود","مسك","لافندر","صندل"];
const devices = ["Windows","Mac","Linux","Android"];
const places = ["القصر","المختبر","المتحف","البورصة"];

// حالة اللعبة
let crime = {};
let selected = "";

// دالة عشوائية
function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

// إنشاء قضية جديدة
function generate(){
    crime = {
        place: rand(places),
        killer: rand(names),
        evidence:{
            blood: rand(blood),
            perfume: rand(perfumes),
            device: rand(devices)
        }
    };

    document.getElementById("place").innerText = crime.place;

    let container = document.getElementById("suspects");
    container.innerHTML = "";

    names.forEach(n=>{
        let div = document.createElement("div");
        div.className = "suspect";
        div.innerText = n;

        div.onclick = function(){
            document.querySelectorAll(".suspect").forEach(s=>s.classList.remove("selected"));
            div.classList.add("selected");
            selected = n;
            document.getElementById("result").innerText = "تم اختيار: " + n;
        };

        container.appendChild(div);
    });
}

// عرض الأدلة
function showEvidence(){
    document.getElementById("evidence").innerText =
    `🩸 دم: ${crime.evidence.blood} | 🧪 عطر: ${crime.evidence.perfume} | 💻 جهاز: ${crime.evidence.device}`;
}

// إصدار الحكم
function finalAnswer(){
    if(!selected){
        alert("اختر مشتبه أولاً!");
        return;
    }

    if(selected === crime.killer){
        document.getElementById("result").innerText =
        "✔️ صحيح! أنت محقق عبقري 🧠";
    }else{
        document.getElementById("result").innerText =
        "❌ خطأ! المجرم الحقيقي هو: " + crime.killer;
    }
}

// تشغيل اللعبة
generate();
</script>

</body>
</html>
